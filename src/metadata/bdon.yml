# PURL configuration for http://purl.obolibrary.org/obo/bdon

idspace: BDON
base_url: /obo/bdon

products:
- bdon.owl: https://raw.githubusercontent.com/Bipolar-Disorder-Ontology/BDON/main/bdon.owl
- bdon.obo: https://raw.githubusercontent.com/Bipolar-Disorder-Ontology/BDON/main/bdon.obo

term_browser: ontobee
example_terms:
- BDON_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/Bipolar-Disorder-Ontology/BDON/v

- prefix: /tracker/
  replacement: https://github.com/Bipolar-Disorder-Ontology/BDON/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/BDON?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/Bipolar-Disorder-Ontology/BDON/main/

